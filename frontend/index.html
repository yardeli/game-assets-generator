<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Assets Generator - AI 3D Asset Creation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>
    
    <!-- Three.js from cdnjs (very reliable) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Three.js loaders (loaded AFTER Three.js) -->
    <script>
        function loadGLTFLoader() {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js';
            script.onload = function() {
                console.log('GLTFLoader loaded successfully');
                window.GLTFLoaderReady = true;
            };
            script.onerror = function() {
                console.warn('Failed to load GLTFLoader');
            };
            document.head.appendChild(script);
        }
        
        // Wait for THREE to be available
        if (typeof THREE !== 'undefined') {
            loadGLTFLoader();
        } else {
            window.addEventListener('load', loadGLTFLoader);
        }
    </script>
    
    <!-- App (loaded last, after all scripts) -->
    <script type="text/babel" src="app.js" defer></script>
</body>
</html>
