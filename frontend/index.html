<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Assets Generator - AI 3D Asset Creation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>
    
    <!-- Three.js from unpkg (most reliable) -->
    <script src="https://unpkg.com/three@r128/build/three.min.js"></script>
    
    <!-- Three.js examples polyfill (for GLTFLoader and other loaders) -->
    <script src="https://unpkg.com/three@r128/examples/js/loaders/GLTFLoader.js"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- App -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
